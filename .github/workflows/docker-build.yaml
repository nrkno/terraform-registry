name: "Build and test"

on:
  push:
    branches:
      - main
  pull_request:
    paths-ignore:
    - '.github/'
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v5.0.0
      -
        name: Docker build
        env:
          DOCKER_TAG: terraform-registry:latest
        run: |
          make DOCKER_TAG="${DOCKER_TAG}" build-docker
          docker image save ${DOCKER_TAG} -o image.tar
